apiVersion: apps/v1
kind: Deployment
metadata:
  name: maven-deployment
  namespace: production
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      application: maven
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  minReadySeconds: 30
  template:
    metadata:
      name: maven-pod
      labels:
        application: maven
    spec:
      containers:
      - name: maven-container
        image: mithuntechnologies/maven-web-application:1
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: maven-service
  namespace: production
spec:
  type: LoadBalancer
  selector:
    application: maven
  ports:
  - port: 80
    targetPort: 8080